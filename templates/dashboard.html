<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Generate Birth Chart</title>
    <link rel="stylesheet" href="\static\dashboard.css">
</head>
    
<script>
    const HOST = "{{ HOST }}";
    const PORT = "{{ PORT }}";
    const sessionData = localStorage.getItem('session');
    if (!sessionData) {
        window.location.href = "/";  // Redirect to login
      /* try {
        const jsonData = JSON.parse(storedData);
        console.log('User data:', jsonData);
        // Access specific properties of the JSON object
        console.log('User name:', jsonData.name);
        console.log('User email:', jsonData.email);
      } catch (error) {
        console.error('Error parsing JSON:', error);
      }
      */
    }
</script>
<body>
    <div class="mainmenu-container">
        <h2>Generate Birth Chart</h2>
        <div id="userContainer"></div>
        <div id="options">
            Name<input type="text" id="name" placeholder="Enter Name">
            <span class="error" id="EmptyNameError">Name required</span>
            <br>
            Date of Birth<input type="date" id="date" placeholder="Enter Date of Birth">
            <span class="error" id="EmptyDOBError">Date of Birth required</span>
            <br>
            Birth Time<input type="time" id="time" placeholder="Enter Birth Time">
            <span class="error" id="EmptyTimeError">Time required</span>
            <br>
            Birth Place<input type="text" id="place" placeholder="Enter Birth City Name">
            <span class="error" id="EmptyPlaceError">Birth City Name required</span>
            <br>
            <button id="generateBtn" style="background-color:green;">GENERATE</button>
        </div>
        <br>
    </div>

    <script>
        const jsonData = JSON.parse(sessionData);
        let user = jsonData.login_id;
        let userContainer = document.getElementById("userContainer");

        userContainer.innerHTML = `<p style="text-align:left;">Login ID : ${user}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<button id="logOutBtn" style="background-color:red;width:25%;">LOGOUT</button></p>`;

        document.getElementById("generateBtn").addEventListener("click", async function() {
            const namE = document.getElementById("name").value.trim();
            const datE = document.getElementById("date").value.trim();
            const timE = document.getElementById("time").value.trim();
            const placE = document.getElementById("place").value.trim();
            let optionsContainer = document.getElementById("options");
            optionsContainer.innerHTML = "<p>Generating...</p><br>";
            const response = await fetch("http://" + HOST + ":" + PORT + "/reports", {
                method: "POST",
                headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ namE, datE, timE, placE })
            });
            const data = await response.json();
            if (data.success) {
                optionsContainer.innerHTML = `<table>${data.message}</table>`;
            } else {
                optionsContainer.innerHTML = `<table>${data.message}</table>`;
            }
        });

        
        document.getElementById("logOutBtn").addEventListener("click", async function() {
            const sessionData = localStorage.getItem('session');
            const sessionJSON = JSON.parse(sessionData);
            const loginId = sessionJSON.login_id;
            const response = await fetch("http://" + HOST + ":" + PORT + "/logout", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ loginId })
            });
            //const data = await response.json();
            localStorage.removeItem("session"); // Remove local session
            alert("Logout successful!");
            window.location.href = "/";  // Redirect to dashboard
        });
    </script>

</body>
</html>
